<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground Registration Form</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f9fafb;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="text-2xl font-bold mb-4 text-center">Playground Registration Form</h2>
        <form action="#" method="POST">
            <div class="mb-4">
                <label for="playgroundName" class="block text-sm font-medium text-gray-700">Playground Name</label>
                <input type="text" id="playgroundName" name="playgroundName" required class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="Enter playground name">
            </div>
            <div class="mb-4">
                <label for="location" class="block text-sm font-medium text-gray-700">Location</label>
                <input type="text" id="location" name="location" required class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="Enter location">
            </div>
            <div class="mb-4">
                <label for="ageGroup" class="block text-sm font-medium text-gray-700">Age Group</label>
                <select id="ageGroup" name="ageGroup" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                    <option value="">Select age group</option>
                    <option value="0-5">0-5 years</option>
                    <option value="6-12">6-12 years</option>
                    <option value="13-17">13-17 years</option>
                    <option value="all">All ages</option>
                </select>
            </div>
            <div class="mb-4">
                <label for="facilities" class="block text-sm font-medium text-gray-700">Facilities Available</label>
                <textarea id="facilities" name="facilities" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="List available facilities (e.g., swings, slides, etc.)"></textarea>
            </div>
            <div class="mb-4">
                <label for="contact" class="block text-sm font-medium text-gray-700">Contact Information</label>
                <input type="text" id="contact" name="contact" required class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="Enter contact information">
            </div>
            <div class="mb-4">
                <label for="comments" class="block text-sm font-medium text-gray-700">Additional Comments</label>
                <textarea id="comments" name="comments" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="Any additional comments or requests"></textarea>
            </div>
            <div class="flex justify-center">
                <button type="submit" class="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
